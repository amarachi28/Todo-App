<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Get Done App</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/7.0.1/css/all.min.css" integrity="sha512-2SwdPD6INVrV/lHTZbO2nodKhrnDdJK9/kg2XD1r9uGqPo1cUbujc+IYdlYdEErWNu69gVcYgdxlmVmzTWnetw==" crossorigin="anonymous" referrerpolicy="no-referrer" />
   <link rel="stylesheet" href="getdone.css">
</head>
<body>
   <div class="container">
      <div class="todo-app">
           <h1>Get Done</h1>
           <form action="" class="input-area">
               <input type="text" id="task-input" placeholder="Add a new task...">
               <button type="submit" id="add-task-btn"><i class="fa fa-plus" aria-hidden="true"></i>
               </button>
           </form>
           <div class="todo-container">
            <ul id="task-list"></ul> 
            <img class="empty-image"  src="images/image.png" alt="empty" width="200">
          </div>
     </div>
         


   </div>

   <script src="getdone.js"></script> 
</body>
</html>
